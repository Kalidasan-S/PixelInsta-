<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Search • Piexlinsta</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="bg-slate-50 min-h-screen">
    <div class="max-w-xl mx-auto py-8 px-4">
      <header class="mb-6 flex items-center justify-between">
        <h1 class="text-xl font-semibold">Search Results</h1>
        <a href="{% url 'home' %}" class="text-sm text-blue-500 font-medium">Back to Home</a>
      </header>

      <form action="{% url 'search' %}" method="GET" class="mb-6">
        <input type="text" name="q" value="{{ query }}" placeholder="Search users" class="w-full bg-white border border-slate-200 rounded-lg px-4 py-3 text-sm focus:ring-2 focus:ring-blue-100 focus:outline-none" required>
      </form>

      {% if query %}
        <div class="space-y-4">
          {% for u in users %}
          <div class="bg-white rounded-xl border border-slate-200 p-4 flex items-center justify-between">
            <div class="flex items-center gap-3 shrink-0">
              <div class="w-10 h-10 rounded-full bg-slate-200 flex items-center justify-center text-sm font-semibold text-slate-600">
                {{ u.username|first|upper }}
              </div>
              <div>
                <a href="{% url 'profile_dynamic' u.username %}" class="font-semibold text-slate-900 hover:text-blue-500">{{ u.username }}</a>
                <p class="text-xs text-slate-500">{{ u.first_name }} {{ u.last_name }}</p>
              </div>
            </div>
            <a href="{% url 'profile_dynamic' u.username %}" class="px-4 py-1.5 bg-blue-500 hover:bg-blue-600 text-white text-sm font-semibold rounded-lg">
              View Profile
            </a>
          </div>
          {% empty %}
          <p class="text-slate-500 text-sm text-center py-6">No users found matching "{{ query }}".</p>
          {% endfor %}
        </div>
      {% endif %}
    </div>
  </body>
</html>
